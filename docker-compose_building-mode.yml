version: "3.9"  # optional since v1.27.0
services:
  httpd:
    build: building-mode/images/httpd
    restart: always
    profiles: [ "main" ]
    networks:
      - rct_net
    ports:
      - "8080:80"
      - "8443:443"
      - "8444:444"
      - "8447:447"
    volumes:
      - ./ssl-certificates/certs:/etc/pki/tls/certs/
      - ./ssl-certificates/keys:/etc/pki/tls/private/
      - ./logs/httpd:/var/log
      - ./images/httpd/httpd.conf:/usr/local/apache2/conf/httpd.conf
      - ./images/httpd/ssl.conf:/usr/local/apache2/conf.d/ssl.conf
  config-server:
    build: building-mode/images/config-server
    restart: always
    profiles: [ "main" ]
    networks:
      - rct_net
    volumes:
      - ./acuity-spring-configs:/usr/root/acuity-spring-configs
      - ./building-mode/builds:/usr/root/builds/
    environment:
      - WAR_NAME=acuity-config-server.war
  flyway:
    image: flyway/flyway:7.5.0-alpine
    restart: on-failure
    profiles: [ "main" ]
    networks:
      - rct_net
    command: migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - FLYWAY_URL=jdbc:postgresql://postgres:5432/acuity_db
      - FLYWAY_USER=dbadmin
      - FLYWAY_PASSWORD=1
      - FLYWAY_PLACEHOLDERS_USER_ACUITY_PASSWORD=your_password
    volumes:
      - ./images/flyway:/flyway/conf
      - ./building-mode/builds/acuity-flyway.jar:/flyway/jars/acuity-flyway.jar
  vahub:
    build: building-mode/images/acuity-app
    restart: always
    profiles: [ "main" ]
    networks:
      - rct_net
    depends_on:
      flyway:
        condition: service_completed_successfully
    volumes:
      - ./logs/vahub:/var/log/
      - ./building-mode/builds:/usr/root/builds/
      - ./vahub-cache:/root
    environment:
      - ENV_TYPE_PROFILE=${ENV_TYPE_PROFILE}
      - AUTH_PROFILE=${AUTH_PROFILE}
      - CONFIG_PROFILE=${CONFIG_PROFILE}
      - OTHER_PROFILES=NoScheduledJobs
      - WAR_NAME=vahub.war
      - SPRING_APPLICATION_NAME=vahub
      - SPRING_CONFIG_IMPORT=configserver:http://config-server:8888/acuity-spring-configs
      - SPRING_MAIN_ALLOW_BEAN_DEFINITION_OVERRIDING=true
      - SPRING_MAIN_ALLOW_CIRCULAR_REFERENCES=true
    env_file:
      - env-configs/vahub.env
  adminui:
    build: building-mode/images/acuity-app
    restart: always
    profiles: [ "main" ]
    networks:
      - rct_net
    depends_on:
      flyway:
        condition: service_completed_successfully
    volumes:
      - ./logs/adminui:/var/log
      - ./building-mode/builds:/usr/root/builds/
      - ./local-file-storage:/usr/root/local-file-storage
    environment:
      - ENV_TYPE_PROFILE=${ENV_TYPE_PROFILE}
      - AUTH_PROFILE=${AUTH_PROFILE}
      - CONFIG_PROFILE=${CONFIG_PROFILE}
      - OTHER_PROFILES=${STORAGE_PROFILE}
      - WAR_NAME=adminui.war
      - SPRING_APPLICATION_NAME=adminui
      - SPRING_CONFIG_IMPORT=configserver:http://config-server:8888/acuity-spring-configs
      - SPRING_CLOUD_CONFIG_URI=http://config-server:8888/acuity-spring-configs
      - SPRING_CLOUD_CONFIG_ENABLED=true
    env_file:
      - env-configs/adminui.env
  postgres:
    build: building-mode/images/postgres
    restart: always
    profiles:
      - main
      - init_db
    networks:
      - rct_net
    env_file: env-configs/postgres.env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dbadmin -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    volumes:
      - pgdata:/var/lib/postgresql/data/pgdata
      - ./images/postgres/data:/usr/root/data
      - ./building-mode/images/postgres/create_db.sql:/docker-entrypoint-initdb.d/create_db.sql
networks:
  rct_net:
    driver: bridge
volumes:
  pgdata:
