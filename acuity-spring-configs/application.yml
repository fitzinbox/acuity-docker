# Render links correctly when running behind a reverse proxy (replaces Boot 1.5 server.use-forward-headers)
server:
  forward-headers-strategy: native

# path to the logs directory
logging:
  file:
    path: /var/log

# database connection data. if needed, the ones you need may be overridden for particular app in its config.
spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/acuity_db
    username: acuity
    password: your_password
    driver-class-name: org.postgresql.Driver
    max-active: 50
    max-idle: 30
    min-idle: 10
    max-wait: 10000
    validation-query: SELECT 1
    test-while-idle: true
    test-on-borrow: true
    test-on-return: false

acuity:
  # used by AdminUI to connect to VAHub
  vahub:
    url: http://vahub:8000
    username: username
    password: pass
  # for authorization module used in all ACUITY apps (basic authentication settings)
  security:
    basic-auth:
      users:
        - username: username
          password: pass
          roles:
            - REMOTE_USER
            - ACL_ADMINISTRATOR
            - TRAINED_USER
          authorities:
            - ADMIN

# Azure Machine Learning settings (used by AdminUI)
azureml:
  enable: false
  webservice:
    qtalgorithm:
      url:
      apikey:
      workspaces:
      service:
      api-version: 2.0
      details: true

integration:
  # Integration with CBioPortal (used by AdminUI and VAHub)
  cbioportal:
    url:
